name: Deploy live camera relay

on:
  push:
    branches: [main]
    paths:
      - "live-camera-relay/**"
      - ".github/workflows/deploy-live-camera-relay.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: live-camera-relay/package-lock.json

      - name: Install dependencies
        working-directory: live-camera-relay
        run: npm ci

      - name: Test runner
        working-directory: live-camera-relay
        run: npm test

      - name: Typecheck Expo app
        working-directory: live-camera-relay
        run: npm run typecheck

      - name: Export Expo web app
        working-directory: live-camera-relay
        run: npm run export:web

      - name: Assemble Pages artifact
        run: |
          mkdir -p site/live-camera-relay
          cp -R live-camera-relay/dist/. site/live-camera-relay/
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
